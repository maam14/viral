<!DOCTYPE html>
<html>
<head>
    <title>Video Viral</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
            cursor: pointer;
        }

        video {
            width: 100%;
            border-radius: 10px;
            display: block;
            pointer-events: none; /* supaya tidak bisa diputar */
        }

        /* Overlay gelap tipis */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        /* Tombol play palsu */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
        }

        .play-button:after {
            content: '';
            position: absolute;
            left: 28px;
            top: 20px;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent black;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Video Viral</h2>

<a href="https://injusticebakery.com/m6p3a6bs?key=7670239307b4020f9c713a3819d5127d" target="_blank">
    <div class="video-container">
        <video>
            <source src="Video 1.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>
        <div class="play-button"></div>
    </div>
</a>

</body>
</html>
